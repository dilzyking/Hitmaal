name: Auto Generate Pages

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Fetch JSON
        run: curl -o data.json https://hitmaal.in/m3u8.json

      - name: Generate Pages
        run: |
          mkdir -p ullu
          mkdir -p api

          echo "[]" > api/data.json

          count=$(jq '.videos | length' data.json)

          for i in $(seq 0 $(($count - 1))); do
            title=$(jq -r ".videos[$i].title" data.json)
            thumb=$(jq -r ".videos[$i].thumbnail" data.json)
            duration=$(jq -r ".videos[$i].duration" data.json)
            stream=$(jq -r ".videos[$i].stream_url" data.json)

            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            file="ullu/$slug.html"

            cp ullu/template.html "$file"

            sed -i "s|{{title}}|$title|g" "$file"
            sed -i "s|{{thumbnail}}|$thumb|g" "$file"
            sed -i "s|{{duration}}|$duration|g" "$file"
            sed -i "s|{{stream_url}}|$stream|g" "$file"

            # Add to API
            jq ". + [{
              \"title\": \"$title\",
              \"thumbnail\": \"$thumb\",
              \"duration\": \"$duration\",
              \"page\": \"/ullu/$slug.html\"
            }]" api/data.json > tmp.json && mv tmp.json api/data.json

          done

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Auto generate pages" || echo "No changes"
          git push
