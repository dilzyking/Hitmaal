<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:'Poppins', sans-serif;
    color:#fff;
}

/* HEADER */
.header{
    padding:12px;
    background:#111;
    display:flex;
    align-items:center;
}

.back{
    background:#ff0000;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    margin-right:10px;
}

/* TITLE */
.title{
    font-size:16px;
}

/* PLAYER */
.player-container{
    width:100%;
    max-width:1000px;
    margin:20px auto;
    aspect-ratio:16/9;
    background:#000;
    border-radius:12px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="header">
    <div class="back" onclick="goBack()">⬅ Back</div>
    <div class="title" id="videoTitle">Loading...</div>
</div>

<div class="player-container">
    <iframe 
    id="playerFrame"
    sandbox="allow-scripts allow-same-origin allow-presentation"
    allow="fullscreen; autoplay; encrypted-media"
    referrerpolicy="no-referrer"
    allowfullscreen>
    </iframe>
</div>

<script>
// GET PARAMS
const params = new URLSearchParams(window.location.search);
const url = params.get("url");
const title = params.get("title");

// SET DATA
document.getElementById("playerFrame").src = url;
document.getElementById("videoTitle").innerText = title || "Video";

// BACK
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
